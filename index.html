<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>经典贪吃蛇</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>经典贪吃蛇</h1>
        <p>使用方向键或 WASD 控制蛇移动。</p>
      </header>

      <section class="hud">
        <div class="hud__score">
          分数：<span data-score>0</span>
        </div>
        <div class="hud__player">
          玩家：<span data-player-name>游客</span>
          <button type="button" data-action="change-name">修改名字</button>
        </div>
        <div class="hud__status" data-status>点击重新开始即可开始游戏。</div>
        <div class="hud__actions">
          <button type="button" data-action="toggle-pause">暂停</button>
          <button type="button" data-action="restart">重新开始</button>
        </div>
      </section>

      <section class="board-wrapper">
        <div class="board" data-board aria-label="贪吃蛇棋盘"></div>
        <div class="board-overlay" data-overlay hidden>
          <p data-overlay-message></p>
          <button type="button" data-overlay-restart>再来一局</button>
        </div>
      </section>

      <section class="touch-controls" data-touch-controls>
        <div class="touch-controls__row">
          <button type="button" data-direction="up">▲</button>
        </div>
        <div class="touch-controls__row">
          <button type="button" data-direction="left">◀</button>
          <button type="button" data-direction="down">▼</button>
          <button type="button" data-direction="right">▶</button>
        </div>
      </section>

      <section class="leaderboard">
        <div class="leaderboard__header">
          <div>
            <h2>排行榜</h2>
            <p data-leaderboard-status>正在连接排行榜...</p>
          </div>
          <button type="button" data-action="refresh-leaderboard">刷新</button>
        </div>
        <ol class="leaderboard__list" data-leaderboard-list></ol>
      </section>

      <section class="instructions">
        <h2>游戏说明</h2>
        <ul>
          <li>吃到食物后，蛇身会变长。</li>
          <li>撞到墙壁或自己的身体就会结束。</li>
          <li>按空格键或点击暂停按钮可暂停或继续。</li>
          <li>随时点击重新开始都可以开启新的一局。</li>
        </ul>
      </section>
    </main>

    <div class="modal" data-name-modal hidden>
      <form class="modal__card" data-name-form>
        <h2>请输入你的名字</h2>
        <p>你的最高分会同步到在线排行榜。</p>
        <label class="modal__label" for="player-name-input">名字</label>
        <input
          id="player-name-input"
          name="playerName"
          type="text"
          maxlength="20"
          autocomplete="nickname"
          placeholder="输入玩家名字"
          required
        />
        <p class="modal__error" data-name-error hidden></p>
        <button type="submit">保存并开始</button>
      </form>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
